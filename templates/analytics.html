<!DOCTYPE html>
<html>
<head>
    <title>Detection Analytics</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Detection History</h1>
        <table>
            <tr>
                <th>Filename</th>
                <th>Detected Classes</th>
                <th>Timestamp</th>
            </tr>
            {% for row in rows %}
            <tr>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
                <td>{{ row[3] }}</td>
            </tr>
            {% endfor %}
        </table>
        <br>
        <a href="{{ url_for('index') }}">Go Back</a>
    </div>
</body>
</html>
